version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fluentiq-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: fluentiq-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend